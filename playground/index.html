<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TextEngine Playground</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0b0b0d;
        color: #f5f5f5;
      }
      a { color: #8ab4ff; }
      nav { display: flex; gap: 12px; flex-wrap: wrap; padding: 16px 24px; border-bottom: 1px solid #222; position: sticky; top: 0; background: #0b0b0dee; backdrop-filter: blur(8px); z-index: 10; }
      nav a { padding: 6px 10px; border-radius: 6px; text-decoration: none; }
      nav a.active { background: #1f2937; }
      main { padding: 24px; }
      section { padding: 60px 0; border-bottom: 1px solid #1a1a1d; }
      section h2 { color: #8ab4ff; margin-top: 0; font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; }
      h1.demo { font-size: 64px; line-height: 1.1; margin: 0; }
      p.demo { font-size: 24px; line-height: 1.4; max-width: 800px; }
      .spacer { height: 60vh; }
      button { background: #1f2937; color: white; border: 1px solid #374151; border-radius: 6px; padding: 8px 14px; cursor: pointer; margin-right: 8px; }
      button:hover { background: #374151; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
